<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Modern Two-Way Colorful Chat ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 1200px;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* Header */
        .chat-header {
            background: linear-gradient(135deg, #6B8DD6 0%, #8E37D7 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Main chat area */
        .chat-main {
            display: flex;
            padding: 20px;
            gap: 20px;
            min-height: 500px;
        }

        /* Individual chat panels */
        .chat-panel {
            flex: 1;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            border: 2px solid;
            transition: transform 0.3s ease;
        }

        .chat-panel:hover {
            transform: translateY(-5px);
        }

        .panel-left {
            border-color: #4682B4;
        }

        .panel-right {
            border-color: #FF69B4;
        }

        /* Panel header */
        .panel-header {
            padding: 15px;
            border-bottom: 2px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 13px 13px 0 0;
        }

        .panel-left .panel-header {
            background: linear-gradient(135deg, #4682B4 0%, #5F9EA0 100%);
            border-color: #4682B4;
            color: white;
        }

        .panel-right .panel-header {
            background: linear-gradient(135deg, #FF69B4 0%, #FF1493 100%);
            border-color: #FF69B4;
            color: white;
        }

        .user-title {
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.3);
        }

        .status.online {
            background: #4CAF50;
            color: white;
        }

        /* Chat area */
        .chat-area {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            min-height: 300px;
            max-height: 400px;
            background: #f8f9fa;
        }

        .panel-left .chat-area {
            background: #F0F8FF;
        }

        .panel-right .chat-area {
            background: #FFF0F5;
        }

        /* Message bubbles */
        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 10px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .message-left {
            background: #4682B4;
            color: white;
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }

        .message-right {
            background: #FF69B4;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.8;
            margin-top: 5px;
            text-align: right;
        }

        /* Input area */
        .input-area {
            padding: 15px;
            border-top: 1px solid #dee2e6;
        }

        .formatting-tools {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            padding: 5px;
            background: #f1f3f4;
            border-radius: 8px;
        }

        .format-btn {
            padding: 5px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .format-btn:hover {
            transform: scale(1.05);
        }

        .format-btn.bold {
            background: #333;
            color: white;
        }

        .font-size-select {
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
        }

        .message-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            resize: none;
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            margin-bottom: 10px;
            transition: border-color 0.3s;
        }

        .message-input:focus {
            outline: none;
            border-color: #6B8DD6;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-send-left {
            background: linear-gradient(135deg, #4682B4, #5F9EA0);
        }

        .btn-send-right {
            background: linear-gradient(135deg, #FF69B4, #FF1493);
        }

        .btn-clear {
            background: linear-gradient(135deg, #808080, #A9A9A9);
        }

        /* Status bar */
        .status-bar {
            background: #f8f9fa;
            padding: 10px 20px;
            border-top: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #6c757d;
        }

        .secure-badge {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .secure-badge i {
            color: #4CAF50;
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            animation: slideIn 0.3s ease;
        }

        /* Scrollbar styling */
        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        .chat-area::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .chat-main {
                flex-direction: column;
            }
            
            .chat-container {
                margin: 10px;
            }
        }

        /* Animated background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                #ff6b6b,
                #4ecdc4,
                #45b7d1,
                #96ceb4,
                #ffeaa7,
                #dfe6e9
            );
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(-10%, -10%) rotate(5deg);
            }
            50% {
                transform: translate(-20%, -20%) rotate(10deg);
            }
            75% {
                transform: translate(-10%, -10%) rotate(5deg);
            }
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            💬 Colorful Messenger 2.0 💬
        </div>

        <!-- Main chat area -->
        <div class="chat-main">
            <!-- Left Panel (User 1) -->
            <div class="chat-panel panel-left">
                <div class="panel-header">
                    <span class="user-title">👤 User 1</span>
                    <span class="status online" id="statusLeft">Online</span>
                </div>
                
                <div class="chat-area" id="chatLeft"></div>
                
                <div class="input-area">
                    <div class="formatting-tools">
                        <button class="format-btn bold" id="boldLeft" onclick="toggleBold('left')">B</button>
                        <select class="font-size-select" id="fontSizeLeft" onchange="updateFont('left')">
                            <option value="12">12</option>
                            <option value="14" selected>14</option>
                            <option value="16">16</option>
                            <option value="18">18</option>
                            <option value="20">20</option>
                        </select>
                    </div>
                    
                    <textarea class="message-input" id="messageLeft" 
                              placeholder="Введите сообщение... (Ctrl+Enter для отправки)" 
                              rows="3"></textarea>
                    
                    <div class="button-group">
                        <button class="btn btn-send-left" onclick="sendMessage('left')">
                            📤 Отправить
                        </button>
                        <button class="btn btn-clear" onclick="clearInput('left')">
                            🧹 Очистить
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Panel (User 2) -->
            <div class="chat-panel panel-right">
                <div class="panel-header">
                    <span class="user-title">👩 User 2</span>
                    <span class="status online" id="statusRight">Online</span>
                </div>
                
                <div class="chat-area" id="chatRight"></div>
                
                <div class="input-area">
                    <div class="formatting-tools">
                        <button class="format-btn bold" id="boldRight" onclick="toggleBold('right')">B</button>
                        <select class="font-size-select" id="fontSizeRight" onchange="updateFont('right')">
                            <option value="12">12</option>
                            <option value="14" selected>14</option>
                            <option value="16">16</option>
                            <option value="18">18</option>
                            <option value="20">20</option>
                        </select>
                    </div>
                    
                    <textarea class="message-input" id="messageRight" 
                              placeholder="Введите сообщение... (Ctrl+Enter для отправки)" 
                              rows="3"></textarea>
                    
                    <div class="button-group">
                        <button class="btn btn-send-right" onclick="sendMessage('right')">
                            📤 Отправить
                        </button>
                        <button class="btn btn-clear" onclick="clearInput('right')">
                            🧹 Очистить
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="secure-badge">
                <span>🔒</span>
                <span>Both users are online • Secure connection • Encrypted</span>
            </div>
            <div id="currentTime"></div>
        </div>
    </div>

    <script>
        // Состояние форматирования
        let boldLeft = false;
        let boldRight = false;
        let fontSizeLeft = 14;
        let fontSizeRight = 14;

        // Функция для обновления времени
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ru-RU', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            document.getElementById('currentTime').textContent = timeString;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Переключение жирного текста
        function toggleBold(side) {
            if (side === 'left') {
                boldLeft = !boldLeft;
                document.getElementById('boldLeft').style.background = boldLeft ? '#000' : '#333';
                document.getElementById('boldLeft').style.color = boldLeft ? '#fff' : '#fff';
            } else {
                boldRight = !boldRight;
                document.getElementById('boldRight').style.background = boldRight ? '#000' : '#333';
                document.getElementById('boldRight').style.color = boldRight ? '#fff' : '#fff';
            }
        }

        // Обновление размера шрифта
        function updateFont(side) {
            if (side === 'left') {
                fontSizeLeft = parseInt(document.getElementById('fontSizeLeft').value);
            } else {
                fontSizeRight = parseInt(document.getElementById('fontSizeRight').value);
            }
        }

        // Отправка сообщения
        function sendMessage(fromSide) {
            const messageInput = document.getElementById(`message${fromSide === 'left' ? 'Left' : 'Right'}`);
            const message = messageInput.value.trim();
            
            if (message) {
                const time = new Date().toLocaleTimeString('ru-RU', { 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
                
                const user = fromSide === 'left' ? 'User 1' : 'User 2';
                const formattedMessage = `[${time}] ${user}: ${message}`;
                
                // Определяем стили для отправителя
                const senderBold = fromSide === 'left' ? boldLeft : boldRight;
                const senderFontSize = fromSide === 'left' ? fontSizeLeft : fontSizeRight;
                
                // Добавляем сообщение в оба чата
                addMessage('left', formattedMessage, fromSide === 'left', senderBold, senderFontSize);
                addMessage('right', formattedMessage, fromSide === 'right', senderBold, senderFontSize);
                
                // Очищаем поле ввода
                messageInput.value = '';
                
                // Обновляем статус
                updateStatus(fromSide);
            }
        }

        // Добавление сообщения в чат
        function addMessage(side, text, isOwn, isBold, fontSize) {
            const chatArea = document.getElementById(`chat${side === 'left' ? 'Left' : 'Right'}`);
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${side === 'left' ? 'message-left' : 'message-right'}`;
            messageDiv.style.fontWeight = isBold ? 'bold' : 'normal';
            messageDiv.style.fontSize = fontSize + 'px';
            
            // Разбиваем текст на части (время, пользователь, сообщение)
            const parts = text.match(/\[(.*?)\]\s(.*?):\s(.*)/);
            if (parts) {
                const time = parts[1];
                const user = parts[2];
                const msgText = parts[3];
                
                messageDiv.innerHTML = `
                    <div>${msgText}</div>
                    <div class="message-time">${time} - ${user}</div>
                `;
            } else {
                messageDiv.textContent = text;
            }
            
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Очистка поля ввода
        function clearInput(side) {
            document.getElementById(`message${side === 'left' ? 'Left' : 'Right'}`).value = '';
        }

        // Обновление статуса
        function updateStatus(side) {
            const statusElement = document.getElementById(`status${side === 'left' ? 'Left' : 'Right'}`);
            const originalText = statusElement.textContent;
            
            statusElement.textContent = 'Typing...';
            statusElement.style.background = '#FFA500';
            
            setTimeout(() => {
                statusElement.textContent = 'Online';
                statusElement.style.background = '#4CAF50';
            }, 1000);
        }

        // Обработка горячих клавиш
        document.getElementById('messageLeft').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                sendMessage('left');
            } else if (e.key === 'Escape') {
                clearInput('left');
            }
        });

        document.getElementById('messageRight').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                sendMessage('right');
            } else if (e.key === 'Escape') {
                clearInput('right');
            }
        });

        // Пример сообщений при загрузке
        window.onload = function() {
            setTimeout(() => {
                addMessage('left', '[12:00] User 1: Привет! Как дела?', true, false, 14);
                addMessage('right', '[12:01] User 2: Привет! Всё отлично, а у тебя?', true, false, 14);
                addMessage('left', '[12:02] User 1: Тоже хорошо! Как проходит день?', true, false, 14);
            }, 500);
        };
    </script>
</body>
</html>
